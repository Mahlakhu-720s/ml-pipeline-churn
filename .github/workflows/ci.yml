name: CI — Lint, Test, and Validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Code quality
  # -----------------------------------------------------------------------
  lint:
    name: Lint & format check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install linting tools
        run: pip install flake8 black isort

      - name: Check formatting (black)
        run: black --check --diff src/ tests/

      - name: Check import ordering (isort)
        run: isort --check-only --diff src/ tests/

      - name: Lint (flake8)
        run: |
          flake8 src/ tests/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503 \
            --exclude=__pycache__,.venv

  # -----------------------------------------------------------------------
  # Job 2: Unit and integration tests
  # -----------------------------------------------------------------------
  test:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v \
            --timeout=120

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # -----------------------------------------------------------------------
  # Job 3: Model validation (trains a mini model end-to-end)
  # -----------------------------------------------------------------------
  model-validation:
    name: Model pipeline smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Start MLflow server
        run: |
          mlflow server \
            --backend-store-uri sqlite:///mlflow.db \
            --default-artifact-root ./mlruns \
            --host 127.0.0.1 --port 5000 &
          sleep 3

      - name: Download dataset
        run: |
          pip install kaggle
          kaggle datasets download -d blastchar/telco-customer-churn
          unzip telco-customer-churn.zip -d data/raw/
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        continue-on-error: true  # gracefully skip if secrets not configured

      - name: Run pipeline smoke test
        run: python tests/smoke_test_pipeline.py
        env:
          MLFLOW_TRACKING_URI: http://127.0.0.1:5000

      - name: Validate AUC gate (must be > 0.80)
        run: |
          python - <<'EOF'
          import json, sys
          with open("evaluation_outputs/evaluation_summary.json") as f:
              summary = json.load(f)
          auc = summary.get("test_auc_roc", 0)
          print(f"Test AUC-ROC: {auc:.4f}")
          if auc < 0.80:
              print("FAIL: AUC below minimum gate (0.80)")
              sys.exit(1)
          print("PASS: AUC meets minimum gate")
          EOF
        continue-on-error: true
